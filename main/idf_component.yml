## IDF Component Manager Manifest
## Run: idf.py update-dependencies  (fetches into managed_components/)
##
## NOTE: After fetching, component CMakeLists.txt must REQUIRE:
##   lvgl__lvgl                   (lvgl/lvgl)
##   espressif__esp_lcd_touch_gt911
##   espressif__esp_hosted        (Wi-Fi via ESP32-C6 coprocessor)

dependencies:
  idf: ">=6.0.1,<6.0.2"

  ## ── UI framework ────────────────────────────────────────────────────
  lvgl/lvgl:
    version: "^9.2.0"

  ## ── Display touch controller (Goodix GT911) ─────────────────────────
  espressif/esp_lcd_touch_gt911:
    version: "^1.1.0"

  ## PCA9535 IO expander driver is vendored locally at
  ## components/esp_io_expander_pca9535 (Seeed reTerminal D1001 fork).

  ## ── USB HID (TinyUSB) ───────────────────────────────────────────────
  ## esp_tinyusb moved to the component registry in IDF v5.x.
  espressif/esp_tinyusb:
    version: "^1.4.2"
    rules:
      - if: "target in [esp32s3, esp32p4]"

  ## ── Networking extras (moved to registry in IDF v5.x) ───────────────
  espressif/esp_websocket_client:
    version: "^1.2.0"
  espressif/mdns:
    version: "^1.3.0"

  ## ── JSON parser (required for IDF v6+, replaces built-in json component) ─
  espressif/cjson:
    version: "^1.7.19"

  ## ── ESP32-C6 hosted wireless coprocessor ────────────────────────────
  ## The reTerminal D1001 uses ESP32-C6 for Wi-Fi 6 / BLE 5.
  ## esp_hosted provides the SPI/SDIO transport layer.
  ## esp_wifi_remote is the WiFi API shim required by esp_hosted on
  ## host chips without native WiFi (ESP32-P4 has SOC_WIRELESS_HOST_SUPPORTED).
  espressif/esp_hosted:
    version: "^2.12.8"
  espressif/esp_wifi_remote:
    version: ">=0.1.0"
