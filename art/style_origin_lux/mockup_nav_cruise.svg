<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1280" width="800" height="1280" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace">
  <!-- =========================================================
       MOCKUP · NAV / CRUISE  ·  Origin 380 Jump  ·  800 × 1280
       Origin Lux — smoked glass, ice blue, gold trim
       ========================================================= -->
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#142540"/>
      <stop offset="6%"  stop-color="#0E1B2E"/>
      <stop offset="100%" stop-color="#070D17"/>
    </linearGradient>
    <linearGradient id="glass-soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1B2D49"/>
      <stop offset="100%" stop-color="#0A1320"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F3DC9C"/>
      <stop offset="50%" stop-color="#D4B26A"/>
      <stop offset="100%" stop-color="#7A5E2B"/>
    </linearGradient>
    <radialGradient id="pageglow" cx="50%" cy="15%" r="80%">
      <stop offset="0%" stop-color="#0E1A2E" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#04070D" stop-opacity="0"/>
    </radialGradient>
    <filter id="iceglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .lbl       { font-size: 11px; fill: #7C8AA0; letter-spacing: 3px; }
      .lbl-d     { font-size: 10px; fill: #54627A; letter-spacing: 2.5px; }
      .hdr       { font-size: 13px; fill: #E8EEF6; letter-spacing: 5px; font-weight: 400; }
      .hdr-gold  { font-size: 11px; fill: #D4B26A; letter-spacing: 4px; }
      .num       { font-size: 22px; fill: #BFE5FF; font-weight: 600; letter-spacing: 1px; }
      .num-d     { font-size: 14px; fill: #54627A; letter-spacing: 1px; }
      .big       { font-size: 60px; fill: #E8EEF6; font-weight: 300; letter-spacing: 2px; }
      .big-ice   { font-size: 60px; fill: #6EC4FF; font-weight: 300; letter-spacing: 2px; }
      .mono-d    { font-size: 11px; fill: #54627A; letter-spacing: 1.5px; }
      .chip      { font-size: 9px; fill: #54627A; letter-spacing: 1px; }
      .warn      { fill: #FF5A6A; }
      .amber     { fill: #FFB454; }
    </style>
  </defs>

  <rect width="800" height="1280" fill="#04070D"/>
  <rect width="800" height="1280" fill="url(#pageglow)"/>

  <!-- ============== TOP BAR ============== -->
  <g>
    <rect width="800" height="64" fill="#070D17"/>
    <line x1="0" y1="64" x2="800" y2="64" stroke="#243349"/>
    <line x1="0" y1="63" x2="800" y2="63" stroke="#5F7A9E" opacity="0.4"/>
    <rect x="0" y="60" width="800" height="1" fill="#D4B26A" opacity="0.7"/>
    <g transform="translate(24,30)">
      <!-- Origin brand disc -->
      <circle r="11" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
      <circle r="3" fill="#D4B26A"/>
    </g>
    <text x="48" y="28" class="hdr">ORIGIN  ·  380  JUMP</text>
    <text x="48" y="46" class="hdr-gold">Navigation  ·  Cruise</text>
    <g transform="translate(776,28)" text-anchor="end">
      <text class="hdr">21 : 04 : 18</text>
      <text y="18" class="chip">UEE  ·  STANTON</text>
    </g>
  </g>

  <!-- ============== HERO  ·  QUANTUM SPOOL ============== -->
  <g transform="translate(20,84)">
    <rect x="3" y="6" width="760" height="320" rx="8" fill="#000" opacity="0.4"/>
    <rect width="760" height="320" rx="6" fill="url(#glass)" stroke="#243349"/>
    <path d="M 6 0 H 754 A 6 6 0 0 1 760 6" fill="none" stroke="#5F7A9E"/>
    <path d="M 6 1.5 H 754" stroke="#BFE5FF" stroke-width="0.5" opacity="0.5"/>
    <!-- gold inlay -->
    <rect x="20" y="20" width="2" height="60" fill="url(#gold)"/>
    <text x="36" y="36" class="hdr">QUANTUM  ·  SPOOL</text>
    <text x="36" y="56" class="hdr-gold">ARC  L1  ·  Wallace Klim Station</text>
    <text x="744" y="36" class="lbl-d" text-anchor="end">DISTANCE  ·  Mm</text>
    <text x="744" y="56" class="lbl-d" text-anchor="end">ETA  ·  m : s</text>

    <!-- Left:  big ring with spool % -->
    <g transform="translate(180,200)">
      <!-- outer faint -->
      <circle r="110" fill="none" stroke="#11203A" stroke-width="8"/>
      <!-- ice arc 0.65 (-> sweep angle 2.04 rad of 2π) -->
      <circle r="110" fill="none" stroke="#6EC4FF" stroke-width="8"
              stroke-dasharray="449 691" transform="rotate(-90)"/>
      <!-- end glow -->
      <g transform="rotate(-90) rotate(234)" filter="url(#iceglow)">
        <circle cx="110" cy="0" r="5" fill="#BFE5FF"/>
      </g>
      <!-- inner gold ring -->
      <circle r="84" fill="none" stroke="#D4B26A" stroke-width="1" opacity="0.55"/>
      <!-- center -->
      <text y="6" font-size="44" fill="#E8EEF6" font-weight="300" text-anchor="middle">0.65 c</text>
      <text y="32" class="lbl" text-anchor="middle">SPOOL  ·  65%</text>
    </g>

    <!-- Right: distance, ETA, charge bar -->
    <g transform="translate(380,108)">
      <text class="lbl-d" y="0">DISTANCE</text>
      <text class="big" y="56">8.4</text>
      <text x="160" y="50" font-size="20" fill="#54627A">Mm</text>

      <text class="lbl-d" y="100">ETA</text>
      <text class="num" y="128">01 : 42</text>

      <!-- charge bar -->
      <g transform="translate(0,156)">
        <text class="lbl-d" y="-6">JUMP  CHARGE</text>
        <rect width="340" height="4" rx="2" fill="#11203A"/>
        <rect width="220" height="4" rx="2" fill="#6EC4FF"/>
        <text x="340" y="22" class="chip" text-anchor="end">65 / 100</text>
      </g>

      <!-- buttons -->
      <g transform="translate(0,196)">
        <g>
          <rect width="160" height="44" rx="6" fill="#0A1320" stroke="#243349"/>
          <text x="80" y="28" font-size="12" fill="#7C8AA0" text-anchor="middle" letter-spacing="3">Cancel</text>
        </g>
        <g transform="translate(180,0)">
          <rect width="160" height="44" rx="6" fill="url(#gold)"/>
          <text x="80" y="28" font-size="12" fill="#04070D" text-anchor="middle" letter-spacing="3" font-weight="600">Engage</text>
        </g>
      </g>
    </g>
  </g>

  <!-- ============== STARMAP + COMPASS ROW ============== -->
  <g transform="translate(20,344)">
    <!-- STARMAP -->
    <g>
      <rect x="3" y="6" width="500" height="300" rx="8" fill="#000" opacity="0.4"/>
      <rect width="500" height="300" rx="6" fill="url(#glass)" stroke="#243349"/>
      <path d="M 6 0 H 494 A 6 6 0 0 1 500 6" fill="none" stroke="#5F7A9E"/>
      <text x="20" y="28" class="hdr">Stanton  System</text>
      <text x="480" y="28" class="lbl-d" text-anchor="end">4  BODIES  ·  2  STATIONS</text>
      <line x1="20" y1="40" x2="480" y2="40" stroke="#243349"/>
      <line x1="20" y1="40" x2="92" y2="40" stroke="#D4B26A" opacity="0.7"/>

      <g transform="translate(250,180)">
        <!-- star (Stanton) -->
        <circle r="8" fill="#FFB454" filter="url(#iceglow)"/>
        <circle r="3.5" fill="#FFE3B0"/>
        <!-- orbits -->
        <g fill="none" stroke="#243349">
          <circle r="38"/><circle r="68"/><circle r="100"/><circle r="132"/>
        </g>
        <!-- planets -->
        <circle cx="38" cy="-2" r="3" fill="#7C8AA0"/>
        <text x="46" y="2" class="chip" fill="#7C8AA0">CRUSADER</text>

        <circle cx="-58" cy="36" r="4.5" fill="#6EC4FF"/>
        <text x="-52" y="50" class="chip" fill="#6EC4FF">HURSTON</text>

        <circle cx="80" cy="-60" r="4" fill="#D4B26A"/>
        <text x="88" y="-56" class="chip" fill="#D4B26A">ARCCORP</text>

        <circle cx="-114" cy="-66" r="6" fill="#BFE5FF"/>
        <text x="-160" y="-72" class="chip" fill="#BFE5FF">microTECH</text>

        <!-- ship (current) -->
        <g transform="translate(-58,36)">
          <circle r="11" fill="none" stroke="#6EC4FF" stroke-dasharray="2 2"/>
          <circle r="2.5" fill="#BFE5FF"/>
        </g>
        <!-- waypoint -->
        <g transform="translate(80,-60)">
          <polygon points="0,-10 10,0 0,10 -10,0" fill="none" stroke="#D4B26A" stroke-width="1.4"/>
          <circle r="2" fill="#D4B26A"/>
        </g>
        <!-- planned route -->
        <path d="M -58 36 Q 0 -30 80 -60" stroke="#D4B26A" stroke-width="0.7" stroke-dasharray="3 3" fill="none"/>
      </g>
      <text x="20" y="282" class="chip">Tap a body to set destination</text>
    </g>

    <!-- COMPASS + ATTITUDE -->
    <g transform="translate(520,0)">
      <rect x="3" y="6" width="260" height="300" rx="8" fill="#000" opacity="0.4"/>
      <rect width="260" height="300" rx="6" fill="url(#glass)" stroke="#243349"/>
      <path d="M 6 0 H 254 A 6 6 0 0 1 260 6" fill="none" stroke="#5F7A9E"/>
      <text x="16" y="28" class="hdr">Attitude</text>
      <text x="244" y="28" class="lbl-d" text-anchor="end">FLT  ·  ASSIST  ON</text>
      <line x1="16" y1="40" x2="244" y2="40" stroke="#243349"/>
      <line x1="16" y1="40" x2="68" y2="40" stroke="#D4B26A" opacity="0.7"/>

      <!-- artificial horizon (simplified) -->
      <g transform="translate(130,150)">
        <circle r="76" fill="#070D17" stroke="#243349"/>
        <!-- horizon line (slight roll) -->
        <g transform="rotate(-6)">
          <rect x="-76" y="0" width="152" height="76" fill="#11203A"/>
          <line x1="-76" y1="0" x2="76" y2="0" stroke="#6EC4FF"/>
          <line x1="-30" y1="-14" x2="30" y2="-14" stroke="#54627A"/>
          <line x1="-20" y1="14" x2="20" y2="14" stroke="#54627A"/>
        </g>
        <!-- nose marker -->
        <path d="M -16 0 L -4 0 L 0 6 L 4 0 L 16 0" stroke="#D4B26A" stroke-width="1.5" fill="none"/>
        <!-- bezel -->
        <circle r="76" fill="none" stroke="#5F7A9E" opacity="0.5"/>
      </g>

      <!-- compass strip below -->
      <g transform="translate(16,250)">
        <rect width="228" height="36" rx="4" fill="#0A1320" stroke="#243349"/>
        <g font-size="10" fill="#7C8AA0" letter-spacing="2">
          <text x="16" y="24">120</text>
          <text x="56" y="24">N</text>
          <text x="92" y="24">150</text>
          <text x="114" y="24" fill="#E8EEF6" font-weight="600">142</text>
          <text x="148" y="24">180</text>
          <text x="184" y="24">E</text>
          <text x="208" y="24">240</text>
        </g>
        <polygon points="114,4 109,0 119,0" fill="#6EC4FF"/>
      </g>
    </g>
  </g>

  <!-- ============== WAYPOINT LIST ============== -->
  <g transform="translate(20,664)">
    <rect x="3" y="6" width="760" height="200" rx="8" fill="#000" opacity="0.4"/>
    <rect width="760" height="200" rx="6" fill="url(#glass)" stroke="#243349"/>
    <path d="M 6 0 H 754 A 6 6 0 0 1 760 6" fill="none" stroke="#5F7A9E"/>
    <text x="20" y="30" class="hdr">Route  Plan</text>
    <text x="744" y="30" class="lbl-d" text-anchor="end">4  LEGS  ·  TOTAL  14 : 22</text>
    <line x1="20" y1="42" x2="744" y2="42" stroke="#243349"/>
    <line x1="20" y1="42" x2="120" y2="42" stroke="#D4B26A" opacity="0.7"/>

    <g transform="translate(20,72)" font-size="12" letter-spacing="2">
      <!-- active row -->
      <g>
        <rect x="-8" y="-20" width="728" height="36" rx="4" fill="#11203A"/>
        <rect x="-8" y="-20" width="2" height="36" fill="#D4B26A"/>
        <text fill="#E8EEF6">1  ·  Hurston  ›  Lorville  CTR</text>
        <text x="540" fill="#6EC4FF" text-anchor="end">8.4 Mm</text>
        <text x="720" fill="#7C8AA0" text-anchor="end">01 : 42</text>
      </g>
      <g transform="translate(0,48)">
        <text fill="#7C8AA0">2  ·  ARC L1  ·  Wallace Klim Station</text>
        <text x="540" fill="#7C8AA0" text-anchor="end">62.0 Mm</text>
        <text x="720" fill="#54627A" text-anchor="end">04 : 18</text>
      </g>
      <g transform="translate(0,80)">
        <text fill="#7C8AA0">3  ·  Crusader  ›  Orison</text>
        <text x="540" fill="#7C8AA0" text-anchor="end">38.4 Mm</text>
        <text x="720" fill="#54627A" text-anchor="end">03 : 22</text>
      </g>
      <g transform="translate(0,112)">
        <text fill="#54627A">+  add waypoint</text>
      </g>
    </g>
  </g>

  <!-- ============== TELEMETRY + COMFORT ============== -->
  <g transform="translate(20,884)">
    <!-- TELEMETRY -->
    <g>
      <rect x="3" y="6" width="370" height="220" rx="8" fill="#000" opacity="0.4"/>
      <rect width="370" height="220" rx="6" fill="url(#glass)" stroke="#243349"/>
      <path d="M 6 0 H 364 A 6 6 0 0 1 370 6" fill="none" stroke="#5F7A9E"/>
      <text x="20" y="28" class="hdr">Telemetry</text>
      <line x1="20" y1="40" x2="350" y2="40" stroke="#243349"/>
      <line x1="20" y1="40" x2="84" y2="40" stroke="#D4B26A" opacity="0.7"/>

      <g transform="translate(20,70)">
        <text class="lbl-d" y="0">VELOCITY  ·  m/s</text>
        <text class="big" y="50">214</text>
        <text x="160" y="44" font-size="16" fill="#54627A">/ 280</text>

        <text class="lbl-d" y="80">SCM  ·  flight assist on</text>

        <g transform="translate(0,98)">
          <rect width="330" height="4" rx="2" fill="#11203A"/>
          <rect width="252" height="4" rx="2" fill="#6EC4FF"/>
          <text x="330" y="22" class="chip" text-anchor="end">throttle  76%</text>
        </g>

        <g transform="translate(0,128)" font-size="11" letter-spacing="2">
          <text fill="#7C8AA0">ALT</text><text x="160" fill="#E8EEF6" text-anchor="end">1.84 km</text>
          <text y="18" fill="#7C8AA0">G</text>  <text x="160" y="18" fill="#6EC4FF" text-anchor="end" font-weight="600">1.0</text>
        </g>
      </g>
    </g>

    <!-- COMFORT (the Origin "luxury" bit) -->
    <g transform="translate(390,0)">
      <rect x="3" y="6" width="370" height="220" rx="8" fill="#000" opacity="0.4"/>
      <rect width="370" height="220" rx="6" fill="url(#glass)" stroke="#243349"/>
      <path d="M 6 0 H 364 A 6 6 0 0 1 370 6" fill="none" stroke="#5F7A9E"/>
      <text x="20" y="28" class="hdr">Cabin</text>
      <text x="350" y="28" class="hdr-gold" text-anchor="end">SALON  ·  CLIMATE</text>
      <line x1="20" y1="40" x2="350" y2="40" stroke="#243349"/>
      <line x1="20" y1="40" x2="60" y2="40" stroke="#D4B26A" opacity="0.7"/>

      <g transform="translate(20,68)">
        <!-- temp -->
        <text class="lbl-d" y="0">TEMPERATURE</text>
        <text font-size="36" fill="#E8EEF6" font-weight="300" y="34">21.4°</text>
        <text x="120" y="28" font-size="11" fill="#6EC4FF">↑ 0.2</text>

        <!-- light -->
        <text class="lbl-d" y="68">LIGHTING</text>
        <g transform="translate(0,76)">
          <rect width="330" height="6" rx="3" fill="#11203A"/>
          <rect width="200" height="6" rx="3" fill="#D4B26A"/>
        </g>
        <text x="0" y="104" class="chip">warm  ·  61%</text>

        <!-- music -->
        <text class="lbl-d" y="128">AUDIO</text>
        <g transform="translate(0,136)">
          <rect width="330" height="6" rx="3" fill="#11203A"/>
          <rect width="86" height="6" rx="3" fill="#6EC4FF"/>
        </g>
        <text x="0" y="164" class="chip">Symphony 9  ·  Beethoven  ·  −12 dB</text>
      </g>
    </g>
  </g>

  <!-- ============== ADVISORY BAR ============== -->
  <g transform="translate(20,1124)">
    <rect width="760" height="56" rx="6" fill="url(#glass)" stroke="#243349"/>
    <path d="M 6 0 H 754 A 6 6 0 0 1 760 6" fill="none" stroke="#5F7A9E"/>
    <rect width="4" height="56" rx="2" fill="#FFB454"/>
    <g transform="translate(30,28)" fill="none" stroke="#FFB454" stroke-width="1.6">
      <circle r="11"/>
      <line x1="0" y1="-5" x2="0" y2="3"/>
      <circle cy="7" r="1" fill="#FFB454" stroke="none"/>
    </g>
    <text x="54" y="26" font-size="13" fill="#E8EEF6" letter-spacing="2">Quantum drive cooling  ·  vector locked for 42 s</text>
    <text x="54" y="44" class="chip">Spool will pause briefly if cabin lighting demands exceed allocation</text>
    <text x="744" y="34" class="chip" text-anchor="end">DISMISS  →</text>
  </g>

  <!-- ============== BOTTOM TAB BAR ============== -->
  <g transform="translate(20,1196)">
    <line y1="0" x2="760" y2="0" stroke="#243349"/>
    <g font-size="12" letter-spacing="3">
      <text x="0" y="28" fill="#E8EEF6">Navigation</text>
      <text x="160" y="28" fill="#7C8AA0">Comfort</text>
      <text x="290" y="28" fill="#7C8AA0">Sensors</text>
      <text x="420" y="28" fill="#7C8AA0">Salon</text>
      <text x="540" y="28" fill="#7C8AA0">Crew</text>
      <text x="640" y="28" fill="#7C8AA0">Settings</text>
    </g>
    <line x1="0" y1="44" x2="120" y2="44" stroke="#D4B26A" stroke-width="2"/>
  </g>

  <!-- footer -->
  <g transform="translate(0,1264)">
    <rect width="800" height="16" fill="#070D17"/>
    <line y1="0" x2="800" y2="0" stroke="#243349"/>
    <line x1="0" y1="0" x2="800" y2="0" stroke="#D4B26A" opacity="0.4" stroke-dasharray="160 640"/>
  </g>
</svg>
